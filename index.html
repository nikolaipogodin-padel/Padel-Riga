<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Riga Tournament</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        header { background: #444; color: #fff; padding: 10px 0; text-align: center; }
        .container { width: 80%; margin: auto; overflow: hidden; }
        #player-registration, #group-generation { margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
    <header>
        <h1>Padel Riga Tournament</h1>
    </header>
    <div class="container">
        <section id="player-registration">
            <h2>Player Registration</h2>
            <form id="registration-form">
                <input type="text" placeholder="Player Name" required />
                <input type="text" placeholder="Player Contact" required />
                <button type="submit">Register</button>
            </form>
            <table id="player-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Contact</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
        <section id="group-generation">
            <h2>Group Generation</h2>
            <button id="generate-groups">Generate Groups</button>
            <table id="group-table">
                <thead>
                    <tr>
                        <th>Group</th>
                        <th>Players</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
        <section id="match-tracking">
            <h2>Match Tracking</h2>
            <form id="match-form">
                <input type="text" placeholder="Player 1" required />
                <input type="text" placeholder="Player 2" required />
                <button type="submit">Submit Match</button>
            </form>
            <table id="match-table">
                <thead>
                    <tr>
                        <th>Match</th>
                        <th>Winner</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
        <section id="standings">
            <h2>Standings</h2>
            <table id="standings-table">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Matches Played</th>
                        <th>Wins</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>
    <script>
        document.getElementById('registration-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const playerName = this[0].value;
            const playerContact = this[1].value;
            document.querySelector('#player-table tbody').insertAdjacentHTML('beforeend', `<tr><td>${playerName}</td><td>${playerContact}</td></tr>`);
            this.reset();
        });

        document.getElementById('generate-groups').addEventListener('click', function() {
            const players = Array.from(document.querySelectorAll('#player-table tbody tr'));
            const groups = {};
            players.forEach((player, index) => {
                const groupIndex = Math.floor(index / 4);
                if (!groups[`Group ${groupIndex + 1}`]) groups[`Group ${groupIndex + 1}`] = [];
                groups[`Group ${groupIndex + 1}`].push(player.cells[0].innerText);
            });
            const groupTableBody = document.querySelector('#group-table tbody');
            groupTableBody.innerHTML = '';
            Object.entries(groups).forEach(([group, players]) => {
                groupTableBody.insertAdjacentHTML('beforeend', `<tr><td>${group}</td><td>${players.join(', ')}</td></tr>`);
            });
        });

        document.getElementById('match-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const player1 = this[0].value;
            const player2 = this[1].value;
            const winner = prompt('Who is the winner? (Enter 1 for Player 1, 2 for Player 2)');
            document.querySelector('#match-table tbody').insertAdjacentHTML('beforeend', `<tr><td>${player1} vs ${player2}</td><td>${winner === '1' ? player1 : player2}</td></tr>`);
            this.reset();
        });

        // Functionality for standings can be implemented similarly by updating the standings based on match results
    </script>
</body>
</html>
